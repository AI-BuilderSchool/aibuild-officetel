<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 340" font-family="'Noto Sans KR',sans-serif">
  <rect x="40" y="30" width="420" height="280" fill="none" stroke="#F7C766" stroke-width="4"/>
  <!-- bedroom 1 -->
  <rect x="40" y="30" width="150" height="130" fill="rgba(255,255,255,0.06)" stroke="#F7C766" stroke-width="2"/>
  <text x="115" y="55" fill="#fff" font-size="13" text-anchor="middle" font-weight="700">침실 1</text>
  <rect x="55" y="70" width="90" height="55" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <!-- bathroom -->
  <rect x="40" y="160" width="80" height="80" fill="rgba(255,255,255,0.06)" stroke="#F7C766" stroke-width="2"/>
  <text x="80" y="204" fill="#fff" font-size="12" text-anchor="middle">욕실</text>
  <!-- alpha room -->
  <rect x="120" y="160" width="70" height="150" fill="rgba(255,255,255,0.06)" stroke="#F7C766" stroke-width="2"/>
  <text x="155" y="235" fill="#fff" font-size="12" text-anchor="middle">알파룸</text>
  <!-- bedroom 2 -->
  <rect x="40" y="240" width="80" height="70" fill="rgba(255,255,255,0.06)" stroke="#F7C766" stroke-width="2"/>
  <text x="80" y="278" fill="#fff" font-size="12" text-anchor="middle">침실 2</text>
  <!-- living room -->
  <rect x="190" y="30" width="180" height="220" fill="none" stroke="#F7C766" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="280" y="60" fill="#fff" font-size="15" text-anchor="middle" font-weight="700">거실</text>
  <!-- kitchen -->
  <rect x="190" y="250" width="180" height="60" fill="rgba(255,255,255,0.06)" stroke="#F7C766" stroke-width="2"/>
  <text x="280" y="284" fill="#fff" font-size="12" text-anchor="middle">주방 / 팬트리</text>
  <!-- balcony -->
  <rect x="370" y="30" width="90" height="280" fill="rgba(235,166,42,0.12)" stroke="#F7C766" stroke-width="2"/>
  <text x="415" y="170" fill="#fff" font-size="12" text-anchor="middle" transform="rotate(90 415 170)">발코니</text>
</svg>
