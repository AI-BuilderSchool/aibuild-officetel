<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" font-family="'Noto Sans KR',sans-serif">
  <!-- 1F -->
  <text x="150" y="20" fill="#F7C766" font-size="14" text-anchor="middle" font-weight="700">1F</text>
  <rect x="30" y="30" width="240" height="280" fill="none" stroke="#F7C766" stroke-width="4"/>
  <rect x="30" y="30" width="120" height="140" fill="none" stroke="#F7C766" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="90" y="55" fill="#fff" font-size="13" text-anchor="middle" font-weight="700">거실</text>
  <rect x="150" y="30" width="120" height="140" fill="rgba(255,255,255,0.06)" stroke="#F7C766" stroke-width="2"/>
  <text x="210" y="55" fill="#fff" font-size="13" text-anchor="middle" font-weight="700">침실 1</text>
  <rect x="165" y="70" width="90" height="55" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <rect x="30" y="170" width="120" height="70" fill="rgba(255,255,255,0.06)" stroke="#F7C766" stroke-width="2"/>
  <text x="90" y="209" fill="#fff" font-size="12" text-anchor="middle">주방</text>
  <rect x="150" y="170" width="70" height="70" fill="rgba(255,255,255,0.06)" stroke="#F7C766" stroke-width="2"/>
  <text x="185" y="209" fill="#fff" font-size="12" text-anchor="middle">욕실</text>
  <!-- staircase -->
  <rect x="220" y="170" width="50" height="140" fill="rgba(235,166,42,0.15)" stroke="#F7C766" stroke-width="2"/>
  <text x="245" y="245" fill="#fff" font-size="11" text-anchor="middle" transform="rotate(90 245 245)">계단</text>
  <line x1="225" y1="180" x2="265" y2="180" stroke="rgba(255,255,255,0.5)"/>
  <line x1="225" y1="195" x2="265" y2="195" stroke="rgba(255,255,255,0.5)"/>
  <line x1="225" y1="210" x2="265" y2="210" stroke="rgba(255,255,255,0.5)"/>
  <line x1="225" y1="225" x2="265" y2="225" stroke="rgba(255,255,255,0.5)"/>
  <line x1="225" y1="240" x2="265" y2="240" stroke="rgba(255,255,255,0.5)"/>
  <line x1="225" y1="255" x2="265" y2="255" stroke="rgba(255,255,255,0.5)"/>
  <rect x="30" y="240" width="120" height="70" fill="none" stroke="none"/>

  <!-- divider -->
  <line x1="320" y1="10" x2="320" y2="330" stroke="rgba(255,255,255,0.25)" stroke-dasharray="6 5"/>

  <!-- 2F -->
  <text x="480" y="20" fill="#F7C766" font-size="14" text-anchor="middle" font-weight="700">2F</text>
  <rect x="370" y="30" width="240" height="280" fill="none" stroke="#F7C766" stroke-width="4"/>
  <rect x="370" y="30" width="115" height="140" fill="rgba(255,255,255,0.06)" stroke="#F7C766" stroke-width="2"/>
  <text x="427" y="55" fill="#fff" font-size="13" text-anchor="middle" font-weight="700">침실 2</text>
  <rect x="485" y="30" width="125" height="140" fill="rgba(255,255,255,0.06)" stroke="#F7C766" stroke-width="2"/>
  <text x="547" y="55" fill="#fff" font-size="13" text-anchor="middle" font-weight="700">침실 3</text>
  <rect x="370" y="170" width="115" height="70" fill="rgba(255,255,255,0.06)" stroke="#F7C766" stroke-width="2"/>
  <text x="427" y="209" fill="#fff" font-size="12" text-anchor="middle">알파룸</text>
  <rect x="560" y="170" width="50" height="140" fill="rgba(235,166,42,0.15)" stroke="#F7C766" stroke-width="2"/>
  <text x="585" y="245" fill="#fff" font-size="11" text-anchor="middle" transform="rotate(90 585 245)">계단</text>
  <rect x="485" y="170" width="75" height="140" fill="none" stroke="#F7C766" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="522" y="245" fill="#fff" font-size="11" text-anchor="middle" transform="rotate(90 522 245)">패밀리룸</text>
</svg>
