<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 320" font-family="'Noto Sans KR',sans-serif">
  <rect width="420" height="320" fill="none"/>
  <!-- outer wall -->
  <rect x="40" y="30" width="340" height="260" fill="none" stroke="#F7C766" stroke-width="4"/>
  <!-- bathroom -->
  <rect x="40" y="30" width="90" height="80" fill="rgba(255,255,255,0.06)" stroke="#F7C766" stroke-width="2"/>
  <text x="85" y="75" fill="#fff" font-size="13" text-anchor="middle">욕실</text>
  <!-- entrance -->
  <rect x="40" y="110" width="40" height="60" fill="none" stroke="#F7C766" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="60" y="145" fill="#fff" font-size="11" text-anchor="middle">현관</text>
  <!-- main studio room -->
  <text x="255" y="60" fill="#fff" font-size="15" text-anchor="middle" font-weight="700">스튜디오 (침실+거실)</text>
  <!-- kitchenette -->
  <rect x="130" y="230" width="130" height="60" fill="rgba(255,255,255,0.06)" stroke="#F7C766" stroke-width="2"/>
  <text x="195" y="264" fill="#fff" font-size="12" text-anchor="middle">주방</text>
  <!-- balcony -->
  <rect x="330" y="30" width="50" height="260" fill="rgba(235,166,42,0.12)" stroke="#F7C766" stroke-width="2"/>
  <text x="355" y="165" fill="#fff" font-size="12" text-anchor="middle" transform="rotate(90 355 165)">발코니</text>
  <!-- bed icon -->
  <rect x="150" y="90" width="90" height="60" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <text x="195" y="120" fill="rgba(255,255,255,0.6)" font-size="10" text-anchor="middle">BED</text>
</svg>
