<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320" font-family="'Noto Sans KR',sans-serif">
  <rect x="40" y="30" width="380" height="260" fill="none" stroke="#F7C766" stroke-width="4"/>
  <!-- bathroom -->
  <rect x="40" y="30" width="90" height="80" fill="rgba(255,255,255,0.06)" stroke="#F7C766" stroke-width="2"/>
  <text x="85" y="75" fill="#fff" font-size="13" text-anchor="middle">욕실</text>
  <!-- alpha room (0.5 room) -->
  <rect x="40" y="110" width="90" height="180" fill="rgba(255,255,255,0.06)" stroke="#F7C766" stroke-width="2"/>
  <text x="85" y="200" fill="#fff" font-size="13" text-anchor="middle">알파룸</text>
  <!-- living/kitchen open area -->
  <rect x="130" y="30" width="200" height="260" fill="none" stroke="#F7C766" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="230" y="60" fill="#fff" font-size="15" text-anchor="middle" font-weight="700">거실 + 침실</text>
  <rect x="150" y="90" width="100" height="60" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <text x="200" y="120" fill="rgba(255,255,255,0.6)" font-size="10" text-anchor="middle">BED</text>
  <rect x="150" y="220" width="160" height="50" fill="rgba(255,255,255,0.06)" stroke="#F7C766" stroke-width="2"/>
  <text x="230" y="250" fill="#fff" font-size="12" text-anchor="middle">주방</text>
  <!-- balcony -->
  <rect x="330" y="30" width="90" height="260" fill="rgba(235,166,42,0.12)" stroke="#F7C766" stroke-width="2"/>
  <text x="375" y="165" fill="#fff" font-size="12" text-anchor="middle" transform="rotate(90 375 165)">발코니</text>
</svg>
